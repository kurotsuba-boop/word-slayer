// ── Smart voice selection: prefer Enhanced/Premium native voices ──
let _voiceCache = {};
const getVoices = () => window.speechSynthesis?.getVoices() || [];

const pickBestVoice = (lang) => {
  if (_voiceCache[lang]) return _voiceCache[lang];
  const voices = getVoices();
  if (!voices.length) return null;
  const langPrefix = lang.split("-")[0]; // "en" or "ja"
  const candidates = voices.filter(v => v.lang.startsWith(langPrefix));
  // Priority: Enhanced/Premium > local quality > any match
  const premium = candidates.find(v => /enhanced|premium/i.test(v.name));
  if (premium) { _voiceCache[lang] = premium; return premium; }
  // On iPad/iOS, prefer Samantha or Karen (en), O-Ren or Kyoko (ja)
  const preferred = lang === "en-US"
    ? ["samantha","karen","daniel","moira","tessa","rishi","ava","zoe","nicky"]
    : ["o-ren","kyoko","otoya","hattori"];
  const named = candidates.find(v => preferred.some(n => v.name.toLowerCase().includes(n)));
  if (named) { _voiceCache[lang] = named; return named; }
  // Fallback: any localService voice (higher quality than remote)
  const local = candidates.find(v => v.localService);
  if (local) { _voiceCache[lang] = local; return local; }
  const any = candidates[0] || null;
  _voiceCache[lang] = any;
  return any;
};

// Pre-load voices (some browsers load async)
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => { _voiceCache = {}; };
}

const speak = (text, lang, rate = 1) => {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  const voice = pickBestVoice(lang);
  if (voice) u.voice = voice;
  // Natural pacing: slightly slower for learning, natural pitch
  u.rate = lang === "en-US" ? Math.min(rate, 0.88) : rate;
  u.pitch = lang === "en-US" ? 1.0 : 1.05;
  // Small pause before speaking feels more natural
  u.volume = 1;
  window.speechSynthesis.speak(u);
};

function WordSlayer() {
  const [screen, setScreen] = useState("title");
  const [playerLevel, setPlayerLevel] = useState(1);
  const [playerXp, setPlayerXp] = useState(0);
  const [xpToNext, setXpToNext] = useState(25);
  const [totalDefeated, setTotalDefeated] = useState(0);
  const [totalWords, setTotalWords] = useState(0);
  const [playerMaxHp, setPlayerMaxHp] = useState(50);
  const [playerHp, setPlayerHp] = useState(50);
  const [gameOver, setGameOver] = useState(false);
  const [playerDamageFlash, setPlayerDamageFlash] = useState(false);
  const [monster, setMonster] = useState(null);
  const [monsterHp, setMonsterHp] = useState(0);
  const [currentWord, setCurrentWord] = useState(null);
  const [typed, setTyped] = useState("");
  const [combo, setCombo] = useState(0);
  const [maxCombo, setMaxCombo] = useState(0);
  const [shakeMonster, setShakeMonster] = useState(false);
  const [hitEffect, setHitEffect] = useState(false);
  const [defeatAnim, setDefeatAnim] = useState(false);
  const [battleLog, setBattleLog] = useState([]);
  const [showResult, setShowResult] = useState(false);
  const [wordsThisBattle, setWordsThisBattle] = useState(0);
  const [mistakesThisBattle, setMistakesThisBattle] = useState(0);
  const [levelUpShow, setLevelUpShow] = useState(false);
  const [damageNum, setDamageNum] = useState(null);
  const [visualPop, setVisualPop] = useState(false);
  const [titleReady, setTitleReady] = useState(false);
  const usedWords = useRef(new Set());

  useEffect(() => { setTimeout(() => setTitleReady(true), 100); }, []);

  const getWordStage = (l) => Math.min(Math.max(Math.ceil(l/2),1),6);

  const pickWord = useCallback((stage) => {
    const pool = [];
    for (let s=Math.max(1,stage-1);s<=Math.min(6,stage);s++) pool.push(...(WORD_SETS[s]||[]));
    const avail=pool.filter(w=>!usedWords.current.has(w.en));
    const list=avail.length>0?avail:pool;
    const word=list[Math.floor(Math.random()*list.length)];
    usedWords.current.add(word.en);
    if(usedWords.current.size>50) usedWords.current.clear();
    return word;
  },[]);

  const pickMonster = useCallback((lvl) => {
    // Show variety early: pool widens with level, but always has range
    const minIdx = Math.max(0, Math.floor((lvl - 1) / 2) - 1);
    const maxIdx = Math.min(MONSTERS.length - 1, Math.floor((lvl - 1) / 2) + 1);
    const idx = minIdx + Math.floor(Math.random() * (maxIdx - minIdx + 1));
    const base = MONSTERS[idx];
    const scale = 1 + (lvl - 1) * 0.12;
    return { ...base, maxHp: Math.floor(base.maxHp * scale) };
  }, []);

  const startBattle = useCallback(()=>{
    const m=pickMonster(playerLevel);
    const hp = 50 + (playerLevel - 1) * 10; // Lv1=50, Lv2=60, etc.
    setPlayerMaxHp(hp); setPlayerHp(hp);
    setMonster(m);setMonsterHp(m.maxHp);
    setCurrentWord(pickWord(getWordStage(playerLevel)));
    setTyped("");setCombo(0);setMaxCombo(0);
    setWordsThisBattle(0);setMistakesThisBattle(0);
    setBattleLog([]);setShowResult(false);setDefeatAnim(false);
    setVisualPop(false);setGameOver(false);setScreen("battle");
  },[playerLevel,pickMonster,pickWord]);

  useEffect(()=>{
    if(currentWord&&screen==="battle"&&!gameOver){
      setVisualPop(true);setTimeout(()=>setVisualPop(false),600);
      // English first, then Japanese after English finishes
      setTimeout(()=>{
        if(!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const uEn = new SpeechSynthesisUtterance(currentWord.en);
        uEn.lang = "en-US";
        const enVoice = pickBestVoice("en-US");
        if(enVoice) uEn.voice = enVoice;
        uEn.rate = 0.82; uEn.pitch = 1.0;
        uEn.onend = () => {
          // Small pause then Japanese
          setTimeout(()=>{
            const uJa = new SpeechSynthesisUtterance(currentWord.ja);
            uJa.lang = "ja-JP";
            const jaVoice = pickBestVoice("ja-JP");
            if(jaVoice) uJa.voice = jaVoice;
            uJa.rate = 0.95; uJa.pitch = 1.05;
            window.speechSynthesis.speak(uJa);
          }, 300);
        };
        window.speechSynthesis.speak(uEn);
      }, 300);
    }
  },[currentWord,screen,gameOver]);

  // Keyboard handler
  useEffect(()=>{
    const handleKeyDown=(e)=>{
      if(screen!=="battle"||!currentWord||showResult||defeatAnim||gameOver) return;
      const key=e.key.toLowerCase();
      if(key.length!==1||!/[a-z]/.test(key)) return;
      e.preventDefault();
      const target=currentWord.en.toLowerCase();
      const nextChar=target[typed.length];
      if(key===nextChar){
        const newTyped=typed+key;
        setTyped(newTyped);
        if(newTyped===target){
          const nc=combo+1;
          setCombo(nc);if(nc>maxCombo) setMaxCombo(nc);
          setWordsThisBattle(p=>p+1);setTotalWords(p=>p+1);
          const dmg=Math.floor((currentWord.en.length||3)*2*(1+nc*0.15));
          setDamageNum(dmg);setTimeout(()=>setDamageNum(null),900);
          // Say Japanese on completion (reinforcement)
          setTimeout(()=>speak(currentWord.ja,"ja-JP",0.95),150);
          setShakeMonster(true);setHitEffect(true);
          setTimeout(()=>{setShakeMonster(false);setHitEffect(false);},400);
          setBattleLog(prev=>[...prev.slice(-6),{en:currentWord.en,ja:currentWord.ja,visual:currentWord.visual,dmg,combo:nc}]);
          const newHp=Math.max(0,monsterHp-dmg);
          setMonsterHp(newHp);
          if(newHp<=0){
            setDefeatAnim(true);setTotalDefeated(p=>p+1);
            const earned=monster.xp+Math.floor(maxCombo*3);
            const nx=playerXp+earned;
            if(nx>=xpToNext){
              setPlayerLevel(l=>l+1);setPlayerXp(nx-xpToNext);
              setXpToNext(x=>Math.floor(x*1.25));
              setLevelUpShow(true);setTimeout(()=>setLevelUpShow(false),2200);
            } else setPlayerXp(nx);
            setTimeout(()=>setShowResult(true),1300);
          } else {
            setCurrentWord(pickWord(getWordStage(playerLevel)));
            setTyped("");
          }
        }
      } else {
        // MISS — player takes damage
        setMistakesThisBattle(p=>p+1);setCombo(0);
        // Damage scales with word stage (harder words = more damage on miss)
        const wordStage = getWordStage(playerLevel);
        const missDmg = 3 + wordStage * 2; // Lv1=5, Lv3=7, Lv5+=9+
        setPlayerHp(prev => {
          const newHp = Math.max(0, prev - missDmg);
          if(newHp <= 0){
            // Game Over
            setTimeout(()=>setGameOver(true), 400);
          }
          return newHp;
        });
        setPlayerDamageFlash(true);
        setTimeout(()=>setPlayerDamageFlash(false), 300);
      }
    };
    window.addEventListener("keydown",handleKeyDown);
    return ()=>window.removeEventListener("keydown",handleKeyDown);
  },[screen,currentWord,typed,combo,maxCombo,monsterHp,monster,playerXp,xpToNext,playerLevel,showResult,defeatAnim,gameOver,pickWord]);

  const replaySound = useCallback(()=>{
    if(!currentWord || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const uEn = new SpeechSynthesisUtterance(currentWord.en);
    uEn.lang = "en-US";
    const enV = pickBestVoice("en-US"); if(enV) uEn.voice = enV;
    uEn.rate = 0.78; uEn.pitch = 1.0;
    uEn.onend = ()=>{
      setTimeout(()=>{
        const uJa = new SpeechSynthesisUtterance(currentWord.ja);
        uJa.lang = "ja-JP";
        const jaV = pickBestVoice("ja-JP"); if(jaV) uJa.voice = jaV;
        uJa.rate = 0.95; uJa.pitch = 1.05;
        window.speechSynthesis.speak(uJa);
      }, 300);
    };
    window.speechSynthesis.speak(uEn);
  },[currentWord]);

  const fontLink="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap";
  const ff="'Cinzel Decorative',serif";
  const ffJa="'Noto Sans JP',sans-serif";

  const CSS=`
    @import url('${fontLink}');
    @keyframes particleDrift{0%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-120px) translateX(30px);opacity:0}}
    @keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-14px) rotate(-3deg)}30%{transform:translateX(12px) rotate(3deg)}45%{transform:translateX(-10px)}60%{transform:translateX(8px)}80%{transform:translateX(-4px)}}
    @keyframes monsterIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes monsterIntro{0%{transform:scale(0) rotate(-10deg);opacity:0}60%{transform:scale(1.1) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
    @keyframes defeat{0%{opacity:1;transform:scale(1);filter:brightness(1)}30%{filter:brightness(3);transform:scale(1.3)}100%{opacity:0;transform:scale(0) rotate(40deg);filter:brightness(0)}}
    @keyframes hitBurst{0%{transform:scale(0.3);opacity:1}100%{transform:scale(2.5);opacity:0}}
    @keyframes damageFloat{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-60px) scale(1.3);opacity:0}}
    @keyframes fadeIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes levelUp{0%{transform:translateY(0) scale(0.8);opacity:0}20%{transform:translateY(-20px) scale(1.2);opacity:1}80%{opacity:1}100%{transform:translateY(-80px) scale(1);opacity:0}}
    @keyframes visualPop{0%{transform:scale(0) rotate(-20deg);opacity:0}50%{transform:scale(1.3) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 15px var(--glow)}50%{box-shadow:0 0 30px var(--glow),0 0 60px var(--glow2)}}
    @keyframes titleSlide{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
    @keyframes swordSpin{0%,100%{transform:rotate(-5deg) scale(1)}25%{transform:rotate(5deg) scale(1.05)}50%{transform:rotate(-3deg) scale(1.1)}75%{transform:rotate(3deg) scale(1.02)}}
    @keyframes comboFire{0%,100%{text-shadow:0 0 10px #f59e0b,0 0 20px #ef4444}50%{text-shadow:0 0 20px #f59e0b,0 0 40px #ef4444,0 0 60px #fbbf24}}
    @keyframes visualBob{0%,100%{transform:translateY(0) rotate(0)}33%{transform:translateY(-8px) rotate(3deg)}66%{transform:translateY(2px) rotate(-2deg)}}
    @keyframes gameOverPulse{0%,100%{text-shadow:0 0 20px #ef4444,0 0 40px #991b1b}50%{text-shadow:0 0 40px #ef4444,0 0 80px #991b1b,0 0 120px #450a0a}}
    @keyframes screenShake{0%,100%{transform:translate(0)}10%{transform:translate(-4px,-2px)}20%{transform:translate(4px,2px)}30%{transform:translate(-2px,4px)}40%{transform:translate(2px,-4px)}50%{transform:translate(-4px,2px)}60%{transform:translate(4px,-2px)}70%{transform:translate(-2px,-4px)}80%{transform:translate(2px,4px)}90%{transform:translate(-4px,-2px)}}
  `;

  const MonsterSVG = monster ? MONSTER_SVGS[monster.idx] : null;

  // ─── TITLE ───
  if(screen==="title"){
    return (
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        background:"radial-gradient(ellipse at 50% 30%, #1a1040 0%, #0a0a1a 50%, #000 100%)",
        fontFamily:ffJa,color:"#fff",position:"relative",overflow:"hidden"}}>
        <style>{CSS}</style>
        <Particles color="rgba(251,191,36,0.6)"/>
        {[400,500].map(s=>(<div key={s} style={{position:"absolute",width:s,height:s,borderRadius:"50%",
          border:`1px solid rgba(251,191,36,${s===400?0.08:0.04})`,top:"50%",left:"50%",transform:"translate(-50%,-50%)"}}/>))}
        <div style={{position:"relative",zIndex:2,display:"flex",flexDirection:"column",alignItems:"center",
          opacity:titleReady?1:0,transition:"opacity 0.6s"}}>
          <div style={{fontSize:72,marginBottom:4,filter:"drop-shadow(0 0 25px rgba(251,191,36,0.5))",
            animation:"swordSpin 4s ease-in-out infinite"}}>⚔️</div>
          <h1 style={{fontFamily:ff,fontSize:48,fontWeight:900,margin:"0 0 4px",
            background:"linear-gradient(180deg, #fde68a 0%, #f59e0b 40%, #b45309 100%)",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
            letterSpacing:6,animation:"titleSlide 0.8s ease-out both"}}>WORD SLAYER</h1>
          <p style={{fontSize:13,color:"rgba(251,191,36,0.6)",marginBottom:40,letterSpacing:8,fontWeight:700,
            animation:"titleSlide 0.8s ease-out 0.2s both"}}>英 単 語 タ イ ピ ン グ バ ト ル</p>
          <OrnateFrame style={{marginBottom:28,animation:"titleSlide 0.8s ease-out 0.3s both"}}>
            <div style={{display:"flex",gap:24,fontSize:13,color:"#d4d4d8"}}>
              <span><span style={{color:"#a78bfa"}}>⚡</span> Lv.{playerLevel}</span>
              <span><span style={{color:"#ef4444"}}>🏆</span> {totalDefeated}体</span>
              <span><span style={{color:"#4ade80"}}>📝</span> {totalWords}語</span>
            </div>
          </OrnateFrame>
          <button onClick={startBattle} style={{fontFamily:ff,padding:"18px 56px",fontSize:20,fontWeight:900,
            background:"linear-gradient(180deg, #f59e0b 0%, #b45309 100%)",
            border:"2px solid rgba(253,230,138,0.5)",borderRadius:12,color:"#fff",cursor:"pointer",letterSpacing:4,
            boxShadow:"0 0 40px rgba(245,158,11,0.3), inset 0 1px 0 rgba(255,255,255,0.2)",
            transition:"all 0.2s",animation:"titleSlide 0.8s ease-out 0.4s both"}}
            onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.06)";e.currentTarget.style.boxShadow="0 0 60px rgba(245,158,11,0.5), inset 0 1px 0 rgba(255,255,255,0.3)";}}
            onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.boxShadow="0 0 40px rgba(245,158,11,0.3), inset 0 1px 0 rgba(255,255,255,0.2)";}}>
            BATTLE</button>
          <p style={{fontSize:11,color:"#52525b",marginTop:28,letterSpacing:1,
            animation:"titleSlide 0.8s ease-out 0.5s both"}}>外付けキーボードで英単語をタイプしてモンスターを倒せ</p>
        </div>
      </div>
    );
  }

  // ─── BATTLE ───
  const hpPct=monster?(monsterHp/monster.maxHp)*100:0;
  const hpColor=hpPct>50?"#4ade80":hpPct>20?"#fbbf24":"#ef4444";
  const xpPct=(playerXp/xpToNext)*100;
  const target=currentWord?.en?.toLowerCase()||"";

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",
      background:monster?.bg||"#000",fontFamily:ffJa,color:"#fff",
      position:"relative",overflow:"hidden",transition:"background 1s"}}>
      <style>{CSS}</style>
      <Particles color={monster?.glow||"#fff"}/>

      {/* Player damage vignette */}
      {playerDamageFlash && (
        <div style={{position:"absolute",inset:0,zIndex:4,pointerEvents:"none",
          boxShadow:"inset 0 0 80px rgba(239,68,68,0.5), inset 0 0 150px rgba(239,68,68,0.2)",
          transition:"opacity 0.15s"}} />
      )}

      {/* HUD */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 20px",
        background:"linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%)",position:"relative",zIndex:5,
        ...(playerDamageFlash ? {boxShadow:"inset 0 0 40px rgba(239,68,68,0.4)"} : {}),
        transition:"box-shadow 0.15s"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{background:"linear-gradient(135deg, #6366f1, #4f46e5)",borderRadius:10,
            width:42,height:42,display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:13,fontWeight:900,fontFamily:ff,border:"1px solid rgba(165,180,252,0.3)",
            boxShadow:"0 0 15px rgba(99,102,241,0.3)"}}>{playerLevel}</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            <div>
              <div style={{fontSize:10,color:"#f87171",marginBottom:2,letterSpacing:2,
                display:"flex",justifyContent:"space-between"}}>
                <span>HP</span><span style={{color:"#a1a1aa",letterSpacing:0}}>{playerHp}/{playerMaxHp}</span>
              </div>
              <div style={{width:100,height:8,background:"rgba(255,255,255,0.08)",borderRadius:4,overflow:"hidden",
                border:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{width:`${(playerHp/playerMaxHp)*100}%`,height:"100%",
                  background: playerHp/playerMaxHp > 0.5 ? "linear-gradient(90deg, #4ade80, #22c55e)"
                    : playerHp/playerMaxHp > 0.2 ? "linear-gradient(90deg, #fbbf24, #f59e0b)"
                    : "linear-gradient(90deg, #ef4444, #dc2626)",
                  borderRadius:4,transition:"width 0.3s ease"}}/>
              </div>
            </div>
            <div>
              <div style={{fontSize:10,color:"#a5b4fc",marginBottom:2,letterSpacing:2}}>EXP</div>
              <div style={{width:100,height:5,background:"rgba(255,255,255,0.08)",borderRadius:3,overflow:"hidden",
                border:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{width:`${xpPct}%`,height:"100%",background:"linear-gradient(90deg, #6366f1, #a78bfa)",
                  borderRadius:3,transition:"width 0.6s ease"}}/>
              </div>
            </div>
          </div>
        </div>
        {combo>=2&&(<div style={{fontFamily:ff,fontSize:18,fontWeight:900,color:"#fbbf24",
          animation:"comboFire 1s ease-in-out infinite",letterSpacing:2}}>{combo} COMBO</div>)}
        <div style={{fontSize:12,color:"#94a3b8"}}>⚔️ {wordsThisBattle}語</div>
      </div>

      {/* Level Up */}
      {levelUpShow&&(<div style={{position:"absolute",top:"18%",left:"50%",transform:"translateX(-50%)",
        zIndex:20,textAlign:"center",animation:"levelUp 2.2s ease-out forwards"}}>
        <div style={{fontFamily:ff,fontSize:36,fontWeight:900,color:"#fbbf24",
          textShadow:"0 0 30px rgba(251,191,36,0.6), 0 0 60px rgba(251,191,36,0.3)"}}>LEVEL UP!</div>
        <div style={{fontSize:16,color:"#fde68a",marginTop:4}}>Lv.{playerLevel}</div>
      </div>)}

      {/* Monster Stage */}
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        position:"relative",zIndex:2,minHeight:260}}>
        {monster&&(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",
            animation:defeatAnim?"defeat 1.2s ease-out forwards":"monsterIntro 0.6s ease-out"}}>
            <div style={{fontSize:14,fontWeight:900,color:monster.glow,letterSpacing:3,marginBottom:8,
              textShadow:`0 0 15px ${monster.glow}40`}}>{monster.name}</div>
            <div style={{width:240,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#94a3b8",marginBottom:3,
                letterSpacing:1,padding:"0 2px"}}><span>HP</span><span>{monsterHp} / {monster.maxHp}</span></div>
              <div style={{height:10,background:"rgba(0,0,0,0.5)",borderRadius:5,overflow:"hidden",
                border:`1px solid ${monster.glow}30`,"--glow":`${monster.glow}30`,"--glow2":`${monster.glow}10`,
                animation:"glowPulse 3s ease-in-out infinite"}}>
                <div style={{width:`${hpPct}%`,height:"100%",
                  background:`linear-gradient(90deg, ${hpColor}, ${hpColor}cc)`,
                  borderRadius:5,transition:"width 0.35s ease",boxShadow:`0 0 8px ${hpColor}60`}}/>
              </div>
            </div>

            {/* Monster + Visual */}
            <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {currentWord&&!defeatAnim&&(
                <div style={{position:"absolute",left:-110,top:"50%",transform:"translateY(-50%)",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div style={{fontSize:80,lineHeight:1,
                    animation:visualPop?"visualPop 0.5s ease-out":"visualBob 3s ease-in-out infinite",
                    filter:`drop-shadow(0 0 20px ${monster.glow}50)`}}>{currentWord.visual}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",
                    background:"rgba(0,0,0,0.4)",padding:"2px 8px",borderRadius:4,
                    backdropFilter:"blur(4px)"}}>{currentWord.ja}</div>
                </div>
              )}
              <div style={{
                filter:`drop-shadow(0 0 30px ${monster.glow}40)`,
                animation:shakeMonster?"shake 0.35s":"monsterIdle 3s ease-in-out infinite",
              }}>
                {MonsterSVG && <MonsterSVG glow={monster.glow}/>}
              </div>
              {damageNum&&(<div style={{position:"absolute",top:-10,right:-30,
                fontFamily:ff,fontSize:30,fontWeight:900,color:"#fbbf24",
                textShadow:"0 0 15px rgba(251,191,36,0.6), 2px 2px 0 #000",
                animation:"damageFloat 0.9s ease-out forwards"}}>-{damageNum}</div>)}
              {hitEffect&&(<div style={{position:"absolute",fontSize:70,
                animation:"hitBurst 0.4s ease-out forwards",pointerEvents:"none"}}>💥</div>)}
            </div>
          </div>
        )}
      </div>

      {/* Word Input */}
      {!showResult&&!gameOver&&currentWord&&(
        <div style={{padding:"20px 20px 28px",
          background:"linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 70%, transparent 100%)",
          display:"flex",flexDirection:"column",alignItems:"center",position:"relative",zIndex:5}}>
          <div style={{display:"flex",gap:5,marginBottom:14}}>
            {target.split("").map((ch,i)=>{
              const done=i<typed.length;const active=i===typed.length;
              return (<div key={i} style={{
                width:52,height:66,display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:36,fontFamily:"'Courier New', Courier, monospace",fontWeight:900,borderRadius:10,textTransform:"uppercase",
                letterSpacing:1,
                color:done?"#000":active?"#fde68a":"#52525b",
                background:done?"linear-gradient(180deg, #4ade80, #16a34a)":active?"rgba(251,191,36,0.12)":"rgba(255,255,255,0.03)",
                border:done?"1px solid #4ade80":active?"1px solid rgba(251,191,36,0.35)":"1px solid rgba(255,255,255,0.05)",
                boxShadow:done?"0 0 14px rgba(74,222,128,0.35), inset 0 1px 0 rgba(255,255,255,0.3)":active?"0 0 12px rgba(251,191,36,0.12)":"none",
                transition:"all 0.12s",
              }}>{ch}</div>);
            })}
          </div>
          <button onClick={e=>{e.stopPropagation();replaySound();}} style={{
            background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",
            borderRadius:8,padding:"5px 16px",color:"#71717a",cursor:"pointer",fontSize:12,marginBottom:8,
            display:"flex",alignItems:"center",gap:6,transition:"all 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.1)"}
            onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.05)"}>
            🔊 もういちど聞く</button>
          {combo>=3&&(<div style={{fontSize:12,color:"#f59e0b",fontWeight:700,marginBottom:4,
            animation:"comboFire 1s ease-in-out infinite"}}>🔥 ダメージ {Math.floor(combo*15)}% UP!</div>)}
          {battleLog.length>0&&(
            <div style={{marginTop:8,display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center",maxWidth:450}}>
              {battleLog.slice(-5).map((l,i)=>(
                <span key={i} style={{fontSize:10,color:"#a1a1aa",background:"rgba(255,255,255,0.03)",
                  border:"1px solid rgba(255,255,255,0.05)",padding:"2px 8px",borderRadius:4}}>
                  {l.visual} {l.en}</span>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Game Over */}
      {gameOver&&(
        <div style={{position:"absolute",inset:0,zIndex:35,
          background:"radial-gradient(ellipse at 50% 40%, rgba(69,10,10,0.92), rgba(0,0,0,0.97))",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          animation:"fadeIn 0.8s ease-out"}}>
          <div style={{animation:"screenShake 0.5s ease-out"}}>
            <div style={{fontSize:64,textAlign:"center",marginBottom:8}}>💀</div>
            <h2 style={{fontFamily:ff,fontSize:36,fontWeight:900,margin:"0 0 8px",textAlign:"center",
              color:"#ef4444",letterSpacing:4,
              animation:"gameOverPulse 2s ease-in-out infinite"}}>GAME OVER</h2>
            <p style={{fontSize:14,color:"#fca5a5",textAlign:"center",marginBottom:8}}>
              {monster?.name}にやられた...
            </p>
          </div>

          <OrnateFrame style={{marginTop:20,marginBottom:24,minWidth:280}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 24px",fontSize:14}}>
              <span style={{color:"#71717a",textAlign:"right"}}>タイプ</span>
              <span style={{fontWeight:700}}>{wordsThisBattle}語</span>
              <span style={{color:"#71717a",textAlign:"right"}}>最大コンボ</span>
              <span style={{fontWeight:700,color:"#f59e0b"}}>{maxCombo}</span>
              <span style={{color:"#71717a",textAlign:"right"}}>ミスタイプ</span>
              <span style={{fontWeight:700,color:"#f87171"}}>{mistakesThisBattle}回</span>
            </div>
          </OrnateFrame>

          {battleLog.length>0&&(
            <div style={{marginBottom:24,maxWidth:420,display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
              {battleLog.map((l,i)=>(
                <span key={i} style={{fontSize:11,padding:"3px 10px",background:"rgba(239,68,68,0.12)",
                  border:"1px solid rgba(239,68,68,0.2)",borderRadius:6,color:"#fca5a5"}}>
                  {l.visual} {l.en} = {l.ja}</span>
              ))}
            </div>
          )}

          <div style={{display:"flex",gap:12}}>
            <button onClick={startBattle} style={{fontFamily:ff,padding:"14px 40px",fontSize:16,fontWeight:900,
              background:"linear-gradient(180deg, #ef4444, #991b1b)",border:"2px solid rgba(252,165,165,0.4)",
              borderRadius:10,color:"#fff",cursor:"pointer",letterSpacing:3,
              boxShadow:"0 0 30px rgba(239,68,68,0.3)",transition:"all 0.2s"}}
              onMouseEnter={e=>e.currentTarget.style.transform="scale(1.05)"}
              onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
              RETRY ⚔️</button>
            <button onClick={()=>setScreen("title")} style={{padding:"14px 20px",fontSize:14,fontWeight:700,
              background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",
              borderRadius:10,color:"#a1a1aa",cursor:"pointer",transition:"all 0.2s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.1)"}
              onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.06)"}>
              タイトルへ</button>
          </div>
        </div>
      )}

      {/* Result */}
      {showResult&&monster&&(
        <div style={{position:"absolute",inset:0,zIndex:30,
          background:"radial-gradient(ellipse at 50% 40%, rgba(0,0,0,0.85), rgba(0,0,0,0.96))",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          animation:"fadeIn 0.6s ease-out"}}>
          <Particles color={monster.glow}/>
          <div style={{position:"relative",zIndex:2,display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{fontSize:52,marginBottom:4}}>🎉</div>
            <h2 style={{fontFamily:ff,fontSize:28,fontWeight:900,margin:"0 0 4px",color:"#fbbf24",letterSpacing:3,
              textShadow:"0 0 20px rgba(251,191,36,0.4)"}}>VICTORY</h2>
            <p style={{fontSize:14,color:"#d4d4d8",marginBottom:24}}>{monster.name}を倒した！</p>
            <OrnateFrame style={{marginBottom:20,minWidth:280}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 24px",fontSize:14}}>
                <span style={{color:"#71717a",textAlign:"right"}}>タイプ</span>
                <span style={{fontWeight:700}}>{wordsThisBattle}語</span>
                <span style={{color:"#71717a",textAlign:"right"}}>最大コンボ</span>
                <span style={{fontWeight:700,color:"#f59e0b"}}>{maxCombo}</span>
                <span style={{color:"#71717a",textAlign:"right"}}>ミス</span>
                <span style={{fontWeight:700,color:mistakesThisBattle===0?"#4ade80":"#f87171"}}>
                  {mistakesThisBattle===0?"PERFECT!":`${mistakesThisBattle}回`}</span>
                <span style={{color:"#71717a",textAlign:"right"}}>EXP</span>
                <span style={{fontWeight:700,color:"#a78bfa"}}>+{monster.xp+Math.floor(maxCombo*3)}</span>
              </div>
            </OrnateFrame>
            <div style={{margin:"0 0 28px",maxWidth:420,display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>
              {battleLog.map((l,i)=>(
                <span key={i} style={{fontSize:11,padding:"3px 10px",background:"rgba(99,102,241,0.12)",
                  border:"1px solid rgba(99,102,241,0.2)",borderRadius:6,color:"#c7d2fe"}}>
                  {l.visual} {l.en} = {l.ja}</span>
              ))}
            </div>
            <div style={{display:"flex",gap:12}}>
              <button onClick={startBattle} style={{fontFamily:ff,padding:"14px 40px",fontSize:16,fontWeight:900,
                background:"linear-gradient(180deg, #f59e0b, #b45309)",border:"2px solid rgba(253,230,138,0.4)",
                borderRadius:10,color:"#fff",cursor:"pointer",letterSpacing:3,
                boxShadow:"0 0 30px rgba(245,158,11,0.3)",transition:"all 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.transform="scale(1.05)"}
                onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
                NEXT ⚔️</button>
              <button onClick={()=>setScreen("title")} style={{padding:"14px 20px",fontSize:14,fontWeight:700,
                background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",
                borderRadius:10,color:"#a1a1aa",cursor:"pointer",transition:"all 0.2s"}}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.1)"}
                onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.06)"}>
                タイトルへ</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(WordSlayer));
  </script>
</body>
</html>
